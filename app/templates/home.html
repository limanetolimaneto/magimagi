{% extends "base.html" %}
<!-- == PAGE TITLE == -->
{% block title %} HOME {% endblock %}

<!-- == PAGE CONTENT == -->
{% block content %}

    <!-- ======================================================
         PAGE HEADER
         ====================================================== -->
    <header class="home-header">
        <p class="auth-logo">
            <label>MAGI</label>
            <img src="{{url_for('static', filename='logo_p.png')}}" width="40px" style="border-radius:7px">
            <label>MAGI</label>
        </p> 
        <label>Task Manager</label>
    </header>

    
    <!-- ======================================================
         MAIN CONTENT
         ====================================================== -->
    <main>
        <div class="public-main-div">
        <section class="public-main-section">
            <!-- Login page shortcut -->
            <div class="login-card">
                <h2>Welcome to MagiMagi</h2>
                <p>Click below to access your account</p>
                <a href="/users" class="login-btn">Go to Login</a>
            </div>
            <!-- HR News Feed Section -->
            <!-- <section class="hr-news-section">
                <h3>Latest News from South Africa</h3>
                <ul id="hr-news-list">
                </ul>
            </section> -->
        </section>
        </div>
    </main>

     <!-- ======================================================
        FOOTER
        Displays default version info
        ====================================================== -->
    <footer>
        <p>MagiMagi v1.2.25 | MIT License | © 2025 MagiMagi</p>
    </footer>

    <!-- ======================================================
         INLINE STYLES SPECIFIC TO HOME PAGE
         ====================================================== -->
    <style>
        body{
            height: 100vh;
        }
        main{
            overflow: hidden;
        }
        .public-main-div{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        .public-main-section{
            width: 100%;
            overflow: hidden;
        }
        /* div login page shortcut style */
        .login-card {
            max-width: 350px;
            margin: 100px auto;
            padding: 40px 30px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #fff;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        }

        .login-card h2 {
            margin-bottom: 15px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .login-card p {
            margin-bottom: 25px;
            font-size: 16px;
            color: #e0e0e0;
        }

        .login-btn {
            display: inline-block;
            padding: 12px 25px;
            font-size: 16px;
            color: #2575fc;
            background: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .login-btn:hover {
            background: #e0e0e0;
            color: #1a5dcc;
        }

{% endblock %}
