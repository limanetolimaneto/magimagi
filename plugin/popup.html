<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Magi Magi</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            width: 320px;
        }

        /* Banner */
        .banner {
            background: #3a5934;
            padding: 16px;
            text-align: center;
        }

        .banner img {
            max-width: 150px;
        }

        /* Container principal */
        .container {
            padding: 16px;
        }

        .label {
            font-size: 13px;
            margin-bottom: 4px;
            font-weight: bold;
            color: #333;
        }

        .input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Texto selecionado */
        .selected-text-box {
            background: #fff;
            padding: 10px;
            border-left: 4px solid #3a5934;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #444;
        }

        /* Botão */
        .btn {
            background: #3a5934;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #2f482a;
        }
    </style>
</head>
<body>

    <!-- Banner -->
    <div class="banner">
        <!-- Coloque sua logo abaixo -->
        <img src="logo.png" alt="Logo Magi Magi" />
    </div>

    <div class="container">

        <!-- Texto selecionado -->
        <div class="selected-text-box" id="selectedText">
            (carregando texto selecionado...)
        </div>

        <!-- Email -->
        <label class="label">Email</label>
        <input type="email" id="email" class="input" placeholder="Digite seu email">

        <!-- Senha -->
        <label class="label">Senha</label>
        <input type="password" id="password" class="input" placeholder="Digite sua senha">

        <!-- URL temporária -->
        <label class="label">URL (temporário)</label>
        <input type="text" id="apiUrl" class="input" placeholder="https://xxx.trycloudflare.com">

        <!-- Enviar -->
        <button class="btn" id="sendTask">Enviar Task</button>

    </div>

    <script>
        // Recebe o texto selecionado enviado pelo background script
        browser.runtime.sendMessage({action: "getSelectedText"}).then(resp => {
            document.getElementById("selectedText").textContent = resp.text || "(nenhum texto selecionado)";
        });
    </script>

</body>
</html>
